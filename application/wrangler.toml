name = "trend-diary"
compatibility_date = "2025-04-01"
compatibility_flags = [ "nodejs_compat" ]
main = "./src/web/worker.ts"
assets = { directory = "./build/client" }

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "trend-diary-db"
database_id = "15dfd380-5a78-4237-8e59-49640c2e954f"
migrations_dir = "migrations"

[[unsafe.bindings]]
name = "STRICT_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[unsafe.bindings]]
name = "DEFAULT_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }
